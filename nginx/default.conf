server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        # HTTP, NOT HTTPS!!!!!!!!!!!!!!!
        # Azure requires HTTP for internal container app URLs, HTTPS in the Azure portal is misleading
        proxy_pass http://backend/;
        proxy_http_version 1.1;
        proxy_set_header X-Forwarded-Host $host;
        # No scheme forwarding because Azure's load balancer terminates TLS
        # Backend container app uses HTTP
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /signin- {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # location = /signin-oidc {
    #     proxy_pass http://backend;
    #     proxy_http_version 1.1;
    #     proxy_set_header X-Forwarded-Host $host;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # }

    location = /api {
        return 301 /api/;
    }
}