version: "3.9"

services:
  db:
    image: postgres:latest
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql
    networks:
      - app_net

  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    restart: always
    depends_on:
      - db
    environment:
      ConnectionStrings__PostgresConnection: "Host=localhost;Database=app;Port=5432;Username=postgres;Password=postgres"
    networks:
      - app_net
    expose:
      - "8080"
    volumes:
      - dp_keys:/root/.aspnet/DataProtection-Keys

  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
    restart: always
    environment:
      - VITE_API_URL=/api
    networks:
      - app_net

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      retries: 1
    networks:
      - app_net

volumes:
  db_data:
  dp_keys:

networks:
  app_net:
