name: Personal finance app deployment

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: financeapp.azurecr.io
  RESOURCE_GROUP: finance-app
  TAG: ${{ github.sha }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6
      - name: create backend env file
        run: |
          set -euxo pipefail
          pwd
          ls -la
          find . -maxdepth 4
          {
            printf '%s\n' "AUTHENTICATION__GITHUB__CLIENTID=${{ secrets.AUTHENTICATION__GITHUB__CLIENTID }}"
            printf '%s\n' "AUTHENTICATION__GITHUB__CLIENTSECRET=${{ secrets.AUTHENTICATION__GITHUB__CLIENTSECRET }}"
            printf '%s\n' "AUTHENTICATION__GOOGLE__CLIENTID=${{ secrets.AUTHENTICATION__GOOGLE__CLIENTID }}"
            printf '%s\n' "AUTHENTICATION__GOOGLE__CLIENTSECRET=${{ secrets.AUTHENTICATION__GOOGLE__CLIENTSECRET }}"
            printf '%s\n' "CONNECTIONSTRINGS__POSTGRESCONNECTION=\"${{ secrets.CONNECTIONSTRINGS__POSTGRESCONNECTION }}\""
            printf '%s\n' "JWT__SCHEMAS__BEARER__SECRETKEY=${{ secrets.JWT__SCHEMAS__BEARER__SECRETKEY }}"
          } > backend/Src/.env
      - name: build backend image
        run: |
          docker build \
          -t "$REGISTRY/backend:$TAG" \
          -f backend/Dockerfile \
          .
      - name: build frontend image
        run: |
          docker build \
          -t "$REGISTRY/frontend:$TAG" \
          -f frontend/Dockerfile \
          .
      # - name: run backend test
      #   working-directory: backend/Tests/IntegrationTests
      #   run: |
      #     set -euxo pipefail
      #     pwd
      #     docker compose run --rm backend dotnet test
      - name: start app
        run: |
          set -euxo pipefail
          ls -la backend/Src
          cat backend/Src/.env
          docker compose up -d
      - name: wait for app
        run: |
          for i in {1...30}; do
            curl -f http://localhost:80/health && exit 0
            sleep 2
          done
          docker compose logs
          exit 1
      # - name: run playwright
      #   run: |
      #     set -euxo pipefail
      #     ls -la frontend
      #     cd frontend
      #     npm ci
      #     npx playwright test
      - name: log in to azure container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.AZURE_CONTAINER_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_CONTAINER_REGISTRY_PASSWORD }}
      - name: push backend image
        run: docker push ${{ env.REGISTRY }}/backend:${{ env.TAG }}
      - name: push frontend image
        run: docker push ${{ env.REGISTRY }}/frontend:${{ env.TAG }}
      - name: azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: deploy backend to azure container apps
        uses: azure/container-apps-deploy-action@v1
        with:
          imageToDeploy: "${{ env.REGISTRY }}/backend:${{ env.TAG }}"
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          containerAppName: backend
      - name: deploy frontend to azure container apps
        uses: azure/container-apps-deploy-action@v1
        with:
          imageToDeploy: "${{ env.REGISTRY }}/frontend:${{ env.TAG }}"
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          containerAppName: frontend
      - name: show logs
        if: failure()
        run: docker compose logs
