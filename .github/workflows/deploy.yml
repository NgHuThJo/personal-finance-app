name: Personal finance app deployment

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: financeapp.azurecr.io
  RESOURCE_GROUP: finance-app
  FRONTEND_CONTAINER_NAME: frontend
  BACKEND_CONTAINER_NAME: backend
  TAG: ${{ github.sha }}

jobs:
  backend-test:
    runs-on: ubuntu-latest
    environment: personal_finance_app_test
    steps:
      - name: checkout
        uses: actions/checkout@v6
      - name: setup dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      - name: restore
        run: dotnet restore backend/Tests/IntegrationTests
      - name: build
        run: dotnet build backend/Tests/IntegrationTests -c Release --no-restore
      - name: run integrations tests
        run: dotnet test backend/Tests/IntegrationTests -c Release --no-build --logger "console;verbosity=detailed"
        env:
          AUTHENTICATION__GOOGLE__CLIENTSECRET: ${{ secrets.AUTHENTICATION__GOOGLE__CLIENTSECRET }}
          AUTHENTICATION__GOOGLE__CLIENTID: ${{ secrets.AUTHENTICATION__GOOGLE__CLIENTID }}
          AUTHENTICATION__GITHUB__CLIENTSECRET: ${{ secrets.AUTHENTICATION__GITHUB__CLIENTSECRET }}
          AUTHENTICATION__GITHUB__CLIENTID: ${{ secrets.AUTHENTICATION__GITHUB__CLIENTID }}

  frontend-test:
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/playwright:v1.60.0-noble
    steps:
      - name: checkout
        uses: actions/checkout@v6
      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: install dependencies
        run: cd frontend && npm ci
      - name: run playwright tests
        env:
          HOME: /root
        run: cd frontend && npm run playwright-ci

  build:
    runs-on: ubuntu-latest
    environment: personal_finance_app
    needs: ["backend-test", "frontend-test"]
    steps:
      - name: checkout
        uses: actions/checkout@v6
      - name: build backend image
        run: |
          docker build \
          -t "$REGISTRY/backend:$TAG" \
          -f backend/Dockerfile \
          .
      - name: build frontend image
        run: |
          docker build \
          -t "$REGISTRY/frontend:$TAG" \
          -f frontend/Dockerfile \
          .
      - name: log in to azure container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.AZURE_CONTAINER_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_CONTAINER_REGISTRY_PASSWORD }}
      - name: push backend image
        run: docker push ${{ env.REGISTRY }}/backend:${{ env.TAG }}
      - name: push frontend image
        run: docker push ${{ env.REGISTRY }}/frontend:${{ env.TAG }}

  deploy:
    runs-on: ubuntu-latest
    environment: personal_finance_app
    needs: build
    steps:
      - name: azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: deploy backend to azure container apps
        uses: azure/container-apps-deploy-action@v1
        with:
          imageToDeploy: ${{ env.REGISTRY }}/backend:${{ env.TAG }}
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          containerAppName: ${{ env.BACKEND_CONTAINER_NAME }}
          containerAppEnvironment: finance-app-env
          location: germanywestcentral
          ingress: external
          targetPort: 8080
          registryUrl: ${{ env.REGISTRY }}
          registryUsername: ${{ secrets.AZURE_CONTAINER_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.AZURE_CONTAINER_REGISTRY_PASSWORD }}
      - name: set backend environment variables
        run: |
          az containerapp update \
            --name ${{ env.BACKEND_CONTAINER_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --set-env-vars \
            ASPNETCORE__URLS=http://+:8080 \
            CONNECTIONSTRINGS__POSTGRESCONNECTION='${{ secrets.CONNECTIONSTRINGS__POSTGRESCONNECTION }}' \
            JWT__SCHEMAS__BEARER__SECRETKEY='${{ secrets.JWT__SCHEMAS__BEARER__SECRETKEY }}' \
            AUTHENTICATION__GOOGLE__CLIENTSECRET='${{ secrets.AUTHENTICATION__GOOGLE__CLIENTSECRET }}' \
            AUTHENTICATION__GOOGLE__CLIENTID='${{ secrets.AUTHENTICATION__GOOGLE__CLIENTID }}' \
            AUTHENTICATION__GITHUB__CLIENTSECRET='${{ secrets.AUTHENTICATION__GITHUB__CLIENTSECRET }}' \
            AUTHENTICATION__GITHUB__CLIENTID='${{ secrets.AUTHENTICATION__GITHUB__CLIENTID }}'
      - name: deploy frontend to azure container apps
        uses: azure/container-apps-deploy-action@v1
        with:
          imageToDeploy: ${{ env.REGISTRY }}/frontend:${{ env.TAG }}
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          containerAppName: ${{ env.FRONTEND_CONTAINER_NAME }}
          containerAppEnvironment: finance-app-env
          location: germanywestcentral
          ingress: external
          targetPort: 80
          registryUrl: ${{ env.REGISTRY }}
          registryUsername: ${{ secrets.AZURE_CONTAINER_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.AZURE_CONTAINER_REGISTRY_PASSWORD }}

  seedDatabase:
    runs-on: ubuntu-latest
    needs: deploy
    environment: personal_finance_app
    steps:
      - name: checkout
        uses: actions/checkout@v6
      - name: build image
        run: |
          docker build \
          -t "$REGISTRY/database-seeding:$TAG" \
          -f backend/DatabaseSeeding/Dockerfile \
          .
      - name: run image
        run: |
          docker run --rm \
          -e CONNECTIONSTRINGS__POSTGRESCONNECTION='${{ secrets.CONNECTIONSTRINGS__POSTGRESCONNECTION }}' \
          "$REGISTRY/database-seeding:$TAG"
